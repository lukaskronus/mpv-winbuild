name: LLVM Toolchain
defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Run custom command before building'
        required: false
        type: string

jobs:
  build_llvm:
    name: Building LLVM and Clang
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    container:
        image: docker://ghcr.io/shinchiro/archlinux:latest
    steps:
      - name: Setup git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git config --global fetch.prune true
          git config --global --add safe.directory $PWD

      - uses: actions/checkout@main
        with:
          ref: ${{ github.ref_name }}

      - name: Loading clang root
        id: clang_root_cache
        uses: actions/cache/restore@main
        with:
          path: clang_root
          key: ${{ secrets.CACHE_VERSION }}-clang_root-${{ github.run_id }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-clang_root

      - name: Loading x86_64 toolchain
        id: x86_64_cache
        uses: actions/cache/restore@main
        with:
          path: build_x86_64
          key: ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-${{ github.run_id }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain

      - name: Loading x86_64_v3 toolchain
        id: x86_64_v3_cache
        uses: actions/cache/restore@main
        with:
          path: build_x86_64_v3
          key: ${{ secrets.CACHE_VERSION }}-clang-x86_64_v3_toolchain-${{ github.run_id }}
          restore-keys: ${{ secrets.CACHE_VERSION }}-clang-x86_64_v3_toolchain

      - name: Running custom command
        if: ${{ github.event.inputs.command != '' }}
        continue-on-error: true
        run: ${{ github.event.inputs.command }}

      - name: Building LLVM with IR Profile Instrumentation
        if: ${{ steps.clang_root_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=GEN -DCOMPILER_TOOLCHAIN=clang -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/clang_root -DMINGW_INSTALL_PREFIX=$GITHUB_WORKSPACE/build_x86_64/x86_64-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$GITHUB_WORKSPACE/src_packages -DRUSTUP_LOCATION=$GITHUB_WORKSPACE/clang_root/install_rustup -G Ninja -B build_x86_64 -S $GITHUB_WORKSPACE
          ninja -C build_x86_64 llvm
          ninja -C build_x86_64 rustup
          ninja -C build_x86_64 cargo-clean

      - name: Building x86_64 toolchain
        if: ${{ steps.x86_64_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=GEN -DCOMPILER_TOOLCHAIN=clang -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/clang_root -DMINGW_INSTALL_PREFIX=$GITHUB_WORKSPACE/build_x86_64/x86_64-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$GITHUB_WORKSPACE/src_packages -DRUSTUP_LOCATION=$GITHUB_WORKSPACE/clang_root/install_rustup -G Ninja -B build_x86_64 -S $GITHUB_WORKSPACE
          ninja -C build_x86_64 llvm-clang

      - name: Building x86_64-v3 toolchain
        if: ${{ steps.x86_64_v3_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=GEN -DCOMPILER_TOOLCHAIN=clang -DGCC_ARCH=x86-64-v3 -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/clang_root -DMINGW_INSTALL_PREFIX=$GITHUB_WORKSPACE/build_x86_64_v3/x86_64_v3-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$GITHUB_WORKSPACE/src_packages -DRUSTUP_LOCATION=$GITHUB_WORKSPACE/clang_root/install_rustup -G Ninja -B build_x86_64_v3 -S $GITHUB_WORKSPACE
          ninja -C build_x86_64_v3 llvm-clang

      - name: PGO training with shaderc
        if: ${{ steps.clang_root_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=GEN -DCLANG_PACKAGES_LTO=ON -DCOMPILER_TOOLCHAIN=clang -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/clang_root -DMINGW_INSTALL_PREFIX=$GITHUB_WORKSPACE/build_x86_64/x86_64-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$GITHUB_WORKSPACE/src_packages -DRUSTUP_LOCATION=$GITHUB_WORKSPACE/clang_root/install_rustup -G Ninja -B build_x86_64 -S $GITHUB_WORKSPACE
          ninja -C build_x86_64 shaderc

      - name: Merging profraw to profdata
        if: ${{ steps.clang_root_cache.outputs.cache-matched-key == '' }}
        run: |
          llvm-profdata merge $GITHUB_WORKSPACE/clang_root/profiles/*.profraw -o llvm.profdata
          rm -rf $GITHUB_WORKSPACE/clang_root/profiles/* || true

      - name: Building LLVM with PGO
        if: ${{ steps.clang_root_cache.outputs.cache-matched-key == '' }}
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 -DLLVM_ENABLE_PGO=USE -DLLVM_PROFDATA_FILE="llvm.profdata" -DCOMPILER_TOOLCHAIN=clang -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/clang_root -DMINGW_INSTALL_PREFIX=$GITHUB_WORKSPACE/build_x86_64/x86_64-w64-mingw32 -DSINGLE_SOURCE_LOCATION=$GITHUB_WORKSPACE/src_packages -DRUSTUP_LOCATION=$GITHUB_WORKSPACE/clang_root/install_rustup -G Ninja -B build_x86_64 -S $GITHUB_WORKSPACE
          ninja -C build_x86_64 llvm

      - name: Cleanup
        run: |
          rm -rf {build_x86_64,build_x86_64_v3}/{toolchain,packages} || true

      - name: Uploading toolchain
        uses: actions/upload-artifact@master
        if: always()
        with:
          name: toolchain
          path: clang_root

      - name: Saving clang root
        uses: actions/cache/save@main
        with:
          path: clang_root
          key: ${{ secrets.CACHE_VERSION }}-clang_root-${{ github.run_id }}

      - name: Saving x86_64 toolchain
        uses: actions/cache/save@main
        with:
          path: build_x86_64
          key: ${{ secrets.CACHE_VERSION }}-clang-x86_64_toolchain-${{ github.run_id }}

      - name: Saving x86_64_v3 toolchain
        uses: actions/cache/save@main
        with:
          path: build_x86_64_v3
          key: ${{ secrets.CACHE_VERSION }}-clang-x86_64_v3_toolchain-${{ github.run_id }}

      - name: Saving repository cache
        if: false
        uses: actions/cache/save@main
        with:
          path: src_packages
          key: ${{ secrets.CACHE_VERSION }}-repository-${{ github.run_id }}

  call_workflow:
    name: Run mpv_clang
    runs-on: ubuntu-latest
    needs: build_llvm
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Run mpv_clang.yml
        run: |
          curl -u ${{ github.actor }}:$GH_TOKEN -X POST -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/actions/workflows/mpv_clang.yml/dispatches -d @- <<EOF
          {
            "ref": "${{ github.ref_name }}",
            "inputs": {
              "sourceforge": "false",
              "github_release": "false",
              "mpv_tarball": "false"
            }
          }
          EOF